<div class="fx-row-start-stretch">
  <button mat-button
          [matTooltip]="'admin.add-group' | translate"
          (click)="addGroup()">
    <studio-lite-wrapped-icon icon="add"></studio-lite-wrapped-icon>
  </button>
  <button mat-button
          [disabled]="!selectedWorkspaceGroupId"
          [matTooltip]="'admin.edit-selected-group' | translate"
          (click)="editGroup()">
    <studio-lite-wrapped-icon icon="edit"></studio-lite-wrapped-icon>
  </button>
  <button mat-button
          [disabled]="!selectedWorkspaceGroupId"
          [matTooltip]="'admin.settings' | translate"
          (click)="editGroupSettings()">
    <studio-lite-wrapped-icon
      data-cy="workspaces-groups-menu-edit"
      icon="settings"></studio-lite-wrapped-icon>
  </button>
</div>
