<div class="editor-container fx-column-start-stretch">
  <div class="fx-row-space-between-end fx-wrap">
    <studio-lite-item-selection
      class="select-item fx-flex-fill"
      [unitItems]="unitItems"
      [selectedItems]="selectedItems"
      [label]="'comment-editor.link-to-item' | translate"
      (selectedItemsChange)="onSelectedItemChange($event)"
      data-cy="comment-editor-link-to-item">
    </studio-lite-item-selection>

    <div class="editor-menubar fx-row-end-stretch fx-wrap">
      <button type="button" mat-icon-button
              matTooltip="{{'comment-editor.bold' | translate}}"
              [matTooltipPosition]="'above'"
              [matTooltipShowDelay]="300"
              [class.active]="editorStates.bold"
              (click)="toggleBold()">
        <studio-lite-wrapped-icon icon="format_bold"></studio-lite-wrapped-icon>
      </button>
      <button type="button" mat-icon-button
              matTooltip="{{'comment-editor.italic' | translate}}"
              [matTooltipPosition]="'above'"
              [matTooltipShowDelay]="300"
              [class.active]="editorStates.italic"
              (click)="toggleItalic()">
        <studio-lite-wrapped-icon icon="format_italic"></studio-lite-wrapped-icon>
      </button>
      <button type="button" mat-icon-button
              matTooltip="{{'comment-editor.underline' | translate}}"
              [matTooltipPosition]="'above'"
              [matTooltipShowDelay]="300"
              [class.active]="editorStates.underline"
              (click)="toggleUnderline()" style="text-decoration: underline">
        <studio-lite-wrapped-icon icon="format_underlined"></studio-lite-wrapped-icon>
      </button>
      <button type="button" mat-icon-button
              matTooltip="{{'comment-editor.superscript' | translate}}"
              [matTooltipPosition]="'above'"
              [matTooltipShowDelay]="300"
              [class.active]="editorStates.superscript"
              (click)="toggleSuperscript()">
        <studio-lite-wrapped-icon icon="superscript"></studio-lite-wrapped-icon>
      </button>
      <button type="button" mat-icon-button
              matTooltip="{{'comment-editor.subscript' | translate}}"
              [matTooltipPosition]="'above'"
              [matTooltipShowDelay]="300"
              [class.active]="editorStates.subscript"
              (click)="toggleSubscript()">
        <studio-lite-wrapped-icon icon="subscript"></studio-lite-wrapped-icon>
      </button>
      <button type="button" mat-icon-button
              matTooltip="{{'comment-editor.strike' | translate}}"
              [matTooltipPosition]="'above'"
              [matTooltipShowDelay]="300"
              [class.active]="editorStates.strike"
              (click)="toggleStrike()">
        <studio-lite-wrapped-icon icon="strikethrough_s"></studio-lite-wrapped-icon>
      </button>
      <div class="fx-row-start-stretch"
           matTooltip="{{'comment-editor.text-color' | translate}}"
           [matTooltipPosition]="'above'">
        <button type="button"
                mat-icon-button
                (click)="applyFontColor()">
          <studio-lite-wrapped-icon icon="format_color_text"></studio-lite-wrapped-icon>
        </button>
        <mat-select
          class="editor-color-select-button"
          [style.background-image]="fontColorButtonStyle"
          (click)="textColorInput.click()">
        </mat-select>
        <input matInput
               type="color"
               #textColorInput hidden
               (input)="onFontColorInput($event)">
      </div>
      <div class="fx-row-start-stretch"
           matTooltip="{{'comment-editor.text-background' | translate}}"
           [matTooltipPosition]="'above'">
        <button type="button"
                mat-icon-button
                (click)="applyHighlightColor()">
          <studio-lite-wrapped-icon icon="format_color_fill"></studio-lite-wrapped-icon>
        </button>
        <mat-select class="editor-color-select-button"
                    [style.background-image]="highlightColorButtonStyle"
                    (click)="textHighlightColorInput.click()">
        </mat-select>
        <input matInput
               type="color"
               #textHighlightColorInput hidden
               (input)="onHighlightColorInput($event)">
      </div>
      <div class="fx-row-start-stretch">
        <button type="button" mat-icon-button
                matTooltip="{{'comment-editor.enumeration' | translate}}"
                [matTooltipPosition]="'above'"
                [matTooltipShowDelay]="300"
                [class.active]="editorStates.bulletList"
                (click)="toggleBulletList()">
          <studio-lite-wrapped-icon icon="format_list_bulleted"></studio-lite-wrapped-icon>
        </button>
        <button type="button" mat-icon-button [matMenuTriggerFor]="bulletMenu"
                class="list-style-trigger" [disableRipple]="true">
          <studio-lite-wrapped-icon icon="arrow_drop_down"></studio-lite-wrapped-icon>
        </button>
        <mat-menu #bulletMenu="matMenu">
          <button mat-menu-item (click)="setBulletListStyle('disc')"
                  [class.active]="currentBulletListStyle === 'disc'">
            <span>● {{'comment-editor.list-style-disc' | translate}}</span>
          </button>
          <button mat-menu-item (click)="setBulletListStyle('circle')"
                  [class.active]="currentBulletListStyle === 'circle'">
            <span>○ {{'comment-editor.list-style-circle' | translate}}</span>
          </button>
          <button mat-menu-item (click)="setBulletListStyle('square')"
                  [class.active]="currentBulletListStyle === 'square'">
            <span>■ {{'comment-editor.list-style-square' | translate}}</span>
          </button>
        </mat-menu>
      </div>
      <div class="fx-row-start-stretch">
        <button type="button" mat-icon-button
                matTooltip="{{'comment-editor.ordered-list' | translate}}"
                [matTooltipPosition]="'above'"
                [matTooltipShowDelay]="300"
                [class.active]="editorStates.orderedList"
                (click)="toggleOrderedList()">
          <studio-lite-wrapped-icon icon="format_list_numbered"></studio-lite-wrapped-icon>
        </button>
        <button type="button" mat-icon-button [matMenuTriggerFor]="orderedMenu"
                class="list-style-trigger" [disableRipple]="true">
          <studio-lite-wrapped-icon icon="arrow_drop_down"></studio-lite-wrapped-icon>
        </button>
        <mat-menu #orderedMenu="matMenu">
          <button mat-menu-item (click)="setOrderedListStyle('decimal')"
                  [class.active]="currentOrderedListStyle === 'decimal'">
            <span>1. {{'comment-editor.list-style-decimal' | translate}}</span>
          </button>
          <button mat-menu-item (click)="setOrderedListStyle('lower-latin')"
                  [class.active]="currentOrderedListStyle === 'lower-latin'">
            <span>a. {{'comment-editor.list-style-lower-latin' | translate}}</span>
          </button>
          <button mat-menu-item (click)="setOrderedListStyle('upper-latin')"
                  [class.active]="currentOrderedListStyle === 'upper-latin'">
            <span>A. {{'comment-editor.list-style-upper-latin' | translate}}</span>
          </button>
          <button mat-menu-item (click)="setOrderedListStyle('lower-roman')"
                  [class.active]="currentOrderedListStyle === 'lower-roman'">
            <span>i. {{'comment-editor.list-style-lower-roman' | translate}}</span>
          </button>
          <button mat-menu-item (click)="setOrderedListStyle('upper-roman')"
                  [class.active]="currentOrderedListStyle === 'upper-roman'">
            <span>I. {{'comment-editor.list-style-upper-roman' | translate}}</span>
          </button>
          <button mat-menu-item (click)="setOrderedListStyle('lower-greek')"
                  [class.active]="currentOrderedListStyle === 'lower-greek'">
            <span>α. {{'comment-editor.list-style-lower-greek' | translate}}</span>
          </button>
        </mat-menu>
      </div>
      <button type="button"
            mat-icon-button
            matTooltip="{{'comment-editor.image' | translate}}"
            [matTooltipPosition]="'above'"
            (click)="addImage()">
      <studio-lite-wrapped-icon icon="image"></studio-lite-wrapped-icon>
    </button>
    </div>
  </div>
  <div class="editor-area fx-row-start-stretch">
    <tiptap-editor class="tip-tap-editor fx-flex-fill"
                   [editor]="editor"
                   [style.font-size.px]="16">
    </tiptap-editor>
  </div>
</div>
